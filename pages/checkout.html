<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Burner Pieces</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="../index.html" class="logo"><span class="logo-text">BURNER</span><span class="logo-sub">PIECES</span></a>
      <div class="nav-actions">
        <a href="../index.html" class="btn-secondary" style="font-size:0.75rem;padding:8px 16px;">Continue Shopping</a>
      </div>
    </div>
  </nav>

  <section class="checkout-page">
    <div class="container">
      <h1 style="font-family:var(--font-display);font-size:2rem;margin-bottom:32px;">Checkout</h1>
      <div class="checkout-layout">
        <div class="checkout-form">
          <form id="checkoutForm">
            <h2>Contact Information</h2>
            <div class="form-group">
              <div class="form-row">
                <div style="flex:1"><label>First Name *</label><input type="text" name="firstName" required></div>
                <div style="flex:1"><label>Last Name *</label><input type="text" name="lastName" required></div>
              </div>
            </div>
            <div class="form-group">
              <label>Email *</label>
              <input type="email" name="email" required>
            </div>
            <div class="form-group">
              <label>Phone *</label>
              <input type="tel" name="phone" required placeholder="+91 98765 43210">
            </div>

            <h2 style="margin-top:32px;">Shipping Address</h2>
            <div class="form-group">
              <label>Address *</label>
              <input type="text" name="address" required placeholder="House no, Street, Locality">
            </div>
            <div class="form-group">
              <label>Apartment / Suite (optional)</label>
              <input type="text" name="address2" placeholder="Flat, Floor, Building">
            </div>
            <div class="form-group">
              <div class="form-row">
                <div style="flex:1"><label>City *</label><input type="text" name="city" required></div>
                <div style="flex:1"><label>State *</label>
                  <select name="state" required>
                    <option value="">Select State</option>
                    <option>Andhra Pradesh</option><option>Arunachal Pradesh</option>
                    <option>Assam</option><option>Bihar</option><option>Chhattisgarh</option>
                    <option>Delhi</option><option>Goa</option><option>Gujarat</option>
                    <option>Haryana</option><option>Himachal Pradesh</option>
                    <option>Jharkhand</option><option>Karnataka</option><option>Kerala</option>
                    <option>Madhya Pradesh</option><option>Maharashtra</option><option>Manipur</option>
                    <option>Meghalaya</option><option>Mizoram</option><option>Nagaland</option>
                    <option>Odisha</option><option>Punjab</option><option>Rajasthan</option>
                    <option>Sikkim</option><option>Tamil Nadu</option><option>Telangana</option>
                    <option>Tripura</option><option>Uttar Pradesh</option><option>Uttarakhand</option>
                    <option>West Bengal</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label>Pincode *</label>
              <input type="text" name="pincode" required pattern="[0-9]{6}" maxlength="6" placeholder="110001">
            </div>

            <h2 style="margin-top:32px;">Additional Notes</h2>
            <div class="form-group">
              <textarea name="notes" rows="3" placeholder="Any special instructions for delivery..."></textarea>
            </div>
          </form>
        </div>

        <div class="order-summary">
          <h2>Order Summary</h2>
          <div id="checkoutItems">
            <!-- Filled by JS -->
          </div>
          <div class="summary-item" style="margin-top:16px;">
            <span>Subtotal</span>
            <span id="checkoutSubtotal">₹0</span>
          </div>
          <div class="summary-item">
            <span>Shipping</span>
            <span id="checkoutShipping">₹0</span>
          </div>
          <div class="summary-item">
            <span>Tax (GST 5%)</span>
            <span id="checkoutTax">₹0</span>
          </div>
          <div class="summary-total">
            <span>Total</span>
            <span id="checkoutTotal">₹0</span>
          </div>
          <button class="btn-primary btn-checkout" style="width:100%;justify-content:center;margin-top:20px;" onclick="processCheckout()">
            <i class="fas fa-lock"></i> Pay with Razorpay
          </button>
          <p style="font-size:0.75rem;color:var(--color-text-muted);text-align:center;margin-top:12px;">
            <i class="fas fa-shield-alt"></i> Secure checkout powered by Razorpay. Your data is encrypted.
          </p>
          <div style="display:flex;justify-content:center;gap:12px;margin-top:12px;opacity:0.5;font-size:1.5rem;">
            <i class="fab fa-cc-visa"></i>
            <i class="fab fa-cc-mastercard"></i>
            <i class="fab fa-google-pay"></i>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom"><p>Burner Pieces &copy; 2025 by Ouro Studio Private Limited. All Rights Reserved.</p></div>
    </div>
  </footer>

  <script src="../js/products.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const items = cart.items;
      const container = document.getElementById('checkoutItems');
      if (items.length === 0) {
        container.innerHTML = '<p style="color:var(--color-text-muted);">Your cart is empty. <a href="../index.html" style="color:var(--color-accent-dark);text-decoration:underline;">Continue shopping</a></p>';
        return;
      }
      container.innerHTML = items.map(item => `
        <div class="summary-item">
          <span>${item.name} × ${item.qty} <span style="color:#999;font-size:0.8rem;">(${item.size})</span></span>
          <span>₹${(item.price * item.qty).toLocaleString('en-IN')}</span>
        </div>
      `).join('');

      const subtotal = cart.getTotal();
      const shipping = subtotal >= 999 ? 0 : 99;
      const tax = Math.round(subtotal * 0.05);
      const total = subtotal + shipping + tax;

      document.getElementById('checkoutSubtotal').textContent = `₹${subtotal.toLocaleString('en-IN')}`;
      document.getElementById('checkoutShipping').textContent = shipping === 0 ? 'FREE' : `₹${shipping}`;
      document.getElementById('checkoutTax').textContent = `₹${tax.toLocaleString('en-IN')}`;
      document.getElementById('checkoutTotal').textContent = `₹${total.toLocaleString('en-IN')}`;
    });
  </script>
</body>
</html>
